<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📊 Projects</h1>
            </div>

            <div class="project-controls">
                <button class="btn btn-primary btn-small" id="newProjectBtn">+ New Project</button>
            </div>

            <div class="projects-list" id="projectsList">
                <!-- Projects will be populated here -->
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-small" id="exportBtn">📥 Export</button>
                <button class="btn btn-secondary btn-small" id="importBtn">📤 Import</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-content">
                    <h1 id="projectTitle">📊 Project Name</h1>
                    <p class="subtitle" id="projectSubtitle">Track your progress</p>
                </div>
                <button class="btn btn-danger btn-small" id="deleteProjectBtn">Delete Project</button>
            </header>

            <!-- Quick Add Changes Form -->
            <section class="quick-add-section">
                <h2>📝 Add Changes</h2>
                <form id="quickAddForm" class="quick-add-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="changeDate">Date (optional, defaults to today):</label>
                            <input type="date" id="changeDate">
                        </div>
                        <div class="form-group">
                            <label for="changeType">Type:</label>
                            <select id="changeType" required>
                                <option value="change">✅ Change Made</option>
                                <option value="goal">🎯 Goal</option>
                                <option value="pivot">🔄 Pivot Point</option>
                                <option value="resource">🔗 Resource Link</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="changeTitle">What did you work on?</label>
                        <input type="text" id="changeTitle" placeholder="Describe what you did today..." required>
                    </div>

                    <div class="form-group">
                        <label for="changeDescription">Details (optional):</label>
                        <textarea id="changeDescription" placeholder="Add more details..." rows="3"></textarea>
                    </div>

                    <!-- Goal Due Date -->
                    <div id="goalDateField" class="form-group hidden">
                        <label for="goalDueDate">Due Date:</label>
                        <input type="date" id="goalDueDate">
                    </div>

                    <!-- Resource Link -->
                    <div id="resourceLinkField" class="form-group hidden">
                        <label for="changeLink">Resource Link:</label>
                        <input type="url" id="changeLink" placeholder="https://example.com">
                    </div>

                    <button type="submit" class="btn btn-primary">Add to Timeline</button>
                </form>
            </section>

            <!-- Timeline Section -->
            <section class="timeline-section">
                <div class="timeline-header">
                    <h2 id="timelineTitle">Timeline</h2>
                    <div class="timeline-filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="change">Changes</button>
                        <button class="filter-btn" data-filter="goal">Goals</button>
                    </div>
                </div>
                <div class="timeline-container">
                    <div class="timeline" id="timeline">
                        <!-- Timeline will be populated by JavaScript -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="newProjectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Project</h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="projectNameInput" placeholder="Project name" maxlength="50">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="confirmProjectBtn">Create</button>
                <button class="btn btn-secondary" id="cancelProjectBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
